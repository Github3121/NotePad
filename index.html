<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./icon.png">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Notepad</title>
</head>
<body>
    <header class="head">
        <div class="icon">
            <img src="./icon.png" alt="Lodding...">
            <h1>NotePad</h1>
        </div>
        <div class="navbar">
            <a href="">Home</a>
            <button onclick="openNote()">Create Note</button>
        </div>
    </header>
    <section class="card-container">
        <p id="notFound" style="color: red;">Not Found Note!!</p>
    </section>
    <div class="note" id="note" style="display: none;">
        <input type="text" placeholder="Title" id="title">
        <textarea cols="5" rows="10" id="txt" placeholder="Type Your Note"></textarea>
        <div class="butt">
            <button onclick="closeNote()">Close</button>
            <button onclick="noteSave()">Save</button>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
